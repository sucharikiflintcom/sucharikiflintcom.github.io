<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aleksandr Kojima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8e2;
    --muted: #5a5a56;
    --accent: #c8c4b0;
    --green-dim: #2a3d2e;
    --green-bright: #4ade80;
    --green-mid: #86efac;
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 48px 120px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* --- HEADER --- */
  .header { width: 100%; margin-bottom: 72px; }

  .name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }

  .name em { font-style: italic; color: var(--accent); }

  .tagline {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.6;
    max-width: 380px;
  }

  /* --- VIEWS --- */
  .views-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
  }

  .views-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .views-count {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* --- SECTION LABEL --- */
  .section-label {
    width: 100%;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 56px;
  }

  /* --- GITHUB GRID --- */
  .contrib-wrap {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  #contrib-grid {
    display: flex;
    gap: 3px;
    min-width: max-content;
  }

  .week-col { display: flex; flex-direction: column; gap: 3px; }

  .day-cell {
    width: 11px; height: 11px;
    border-radius: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.15s;
    cursor: default;
  }

  .day-cell:hover { border-color: var(--border-hover); }
  .day-cell[data-level="1"] { background: #1a2e1c; border-color: #2a4a2e; }
  .day-cell[data-level="2"] { background: #22582a; border-color: #2d7036; }
  .day-cell[data-level="3"] { background: #2da44e; border-color: #38c65e; }
  .day-cell[data-level="4"] { background: #4ade80; border-color: #6bef99; }

  .contrib-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .contrib-total { font-size: 12px; color: var(--muted); }

  .contrib-legend {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .contrib-legend span { font-size: 10px; color: var(--muted); }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; border: 1px solid var(--border); }
  .legend-cell.l0 { background: var(--surface); }
  .legend-cell.l1 { background: #1a2e1c; border-color: #2a4a2e; }
  .legend-cell.l2 { background: #22582a; border-color: #2d7036; }
  .legend-cell.l3 { background: #2da44e; border-color: #38c65e; }
  .legend-cell.l4 { background: #4ade80; border-color: #6bef99; }

  /* --- DIVIDER --- */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-top: 56px;
  }

  /* --- COMMENTS --- */
  .comments-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .comment {
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .comment:hover { border-color: var(--border-hover); }

  .comment-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .comment-author { font-size: 12px; color: var(--accent); letter-spacing: 0.03em; }
  .comment-time { font-size: 11px; color: var(--muted); }
  .comment-text { font-size: 13px; color: var(--text); line-height: 1.65; opacity: 0.85; }

  .show-more-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: border-color 0.2s, color 0.2s;
  }

  .show-more-btn:hover { border-color: var(--border-hover); color: var(--text); }

  /* --- COMMENT FORM --- */
  .comment-form {
    width: 100%;
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .form-row { display: flex; gap: 10px; }

  .comment-form input,
  .comment-form textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 4px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  .comment-form input::placeholder,
  .comment-form textarea::placeholder { color: var(--muted); }

  .comment-form input:focus,
  .comment-form textarea:focus { border-color: var(--border-hover); }

  .submit-btn {
    background: none;
    border: 1px solid var(--border-hover);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 11px 24px;
    border-radius: 4px;
    cursor: pointer;
    align-self: flex-start;
    transition: background 0.2s, border-color 0.2s;
  }

  .submit-btn:hover { background: rgba(255,255,255,0.05); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .form-status { font-size: 12px; color: var(--muted); }
  .form-status.ok { color: #4ade80; }
  .form-status.err { color: #f87171; }

  /* --- FOOTER --- */
  .footer {
    width: 100%;
    margin-top: 72px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-name { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .footer-year { font-size: 11px; color: var(--muted); }

  /* --- SKELETON --- */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, #1a1a1e 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .error-msg { font-size: 12px; color: var(--muted); padding: 16px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1 class="name">Aleksandr <em>Kojima</em></h1>
  <p class="tagline">building things quietly.</p>
  <div class="views-row">
    <div class="views-dot"></div>
    <span class="views-count" id="views-count">— views</span>
  </div>
</header>

<!-- GITHUB ACTIVITY -->
<p class="section-label">github activity</p>
<div class="contrib-wrap">
  <div id="contrib-grid"><div style="display:flex;gap:3px;" id="skel-wrap"></div></div>
</div>
<div class="contrib-footer">
  <span class="contrib-total" id="contrib-total"></span>
  <div class="contrib-legend">
    <span>less</span>
    <div class="legend-cell l0"></div>
    <div class="legend-cell l1"></div>
    <div class="legend-cell l2"></div>
    <div class="legend-cell l3"></div>
    <div class="legend-cell l4"></div>
    <span>more</span>
  </div>
</div>

<div class="divider"></div>

<!-- COMMENTS -->
<p class="section-label">comments</p>
<div class="comments-list" id="comments-list">
  <p class="error-msg" id="comments-loading">loading...</p>
</div>

<div class="comment-form">
  <div class="form-row">
    <input type="text" id="inp-name" placeholder="name" maxlength="40">
    <input type="text" id="inp-url" placeholder="url (optional)" maxlength="100">
  </div>
  <textarea id="inp-text" rows="3" placeholder="leave a comment..." maxlength="500"></textarea>
  <div style="display:flex;align-items:center;gap:16px;">
    <button class="submit-btn" id="submit-btn">send →</button>
    <span class="form-status" id="form-status"></span>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <span class="footer-name">aleksandr kojima</span>
  <span class="footer-year" id="footer-year"></span>
</footer>

<script>
const SUPABASE_URL = 'https://botozcvdxnmhikziqtbx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdG96Y3ZkeG5taGlremlxdGJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTQ4OTgsImV4cCI6MjA5NTY3MDg5OH0.kreHeUyGY5OoAzYlR1Kz4Nvbw1bHwkP4mAxFMahMg08';
const GH_USER = 'sucharikiflintcom';

document.getElementById('footer-year').textContent = new Date().getFullYear();

async function sb(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: opts.prefer || '',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function initViews() {
  try {
    await sb('page_views?page=eq.home', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates',
      body: { page: 'home', views: 1 },
      headers: { Prefer: 'resolution=merge-duplicates' }
    }).catch(() => {});
    try {
      await sb('rpc/increment_views', { method: 'POST', body: { page_name: 'home' } });
    } catch {}
    const rows = await sb('page_views?page=eq.home&select=views');
    const v = rows?.[0]?.views ?? '—';
    document.getElementById('views-count').textContent = v + ' views';
  } catch (e) {
    document.getElementById('views-count').textContent = '— views';
  }
}

initViews();

async function loadGithub() {
  const wrap = document.getElementById('contrib-grid');
  const skelWrap = document.getElementById('skel-wrap');
  for (let i = 0; i < 53; i++) {
    const col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;gap:3px;';
    for (let j = 0; j < 7; j++) {
      const c = document.createElement('div');
      c.className = 'day-cell skeleton';
      col.appendChild(c);
    }
    skelWrap.appendChild(col);
  }
  try {
    const res = await fetch(`https://github-contributions-api.jogruber.de/v4/${GH_USER}?y=last`);
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    const contributions = json.contributions;
    wrap.innerHTML = '';
    const weeks = [];
    let week = [];
    contributions.forEach(day => {
      week.push(day);
      if (week.length === 7) { weeks.push(week); week = []; }
    });
    if (week.length) weeks.push(week);
    const totalContribs = contributions.reduce((s, d) => s + d.count, 0);
    document.getElementById('contrib-total').textContent = totalContribs.toLocaleString() + ' contributions in the last year';
    weeks.forEach(wk => {
      const col = document.createElement('div');
      col.className = 'week-col';
      wk.forEach(day => {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.dataset.level = day.level;
        cell.title = day.count + ' contributions on ' + day.date;
        col.appendChild(cell);
      });
      wrap.appendChild(col);
    });
  } catch (e) {
    wrap.innerHTML = '<p class="error-msg">could not load activity</p>';
    document.getElementById('contrib-total').textContent = '';
  }
}

loadGithub();

let allComments = [];
const VISIBLE = 3;
let expanded = false;

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 2592000) return Math.floor(diff/86400) + 'd ago';
  return new Date(dateStr).toLocaleDateString('en', { month:'short', day:'numeric' });
}

function renderComments() {
  const list = document.getElementById('comments-list');
  list.innerHTML = '';
  if (!allComments.length) {
    list.innerHTML = '<p class="error-msg">no comments yet. be the first.</p>';
    return;
  }
  const toShow = expanded ? allComments : allComments.slice(0, VISIBLE);
  toShow.forEach(c => {
    const el = document.createElement('div');
    el.className = 'comment';
    el.innerHTML = `
      <div class="comment-header">
        <span class="comment-author">${escHtml(c.author)}</span>
        <span class="comment-time">${timeAgo(c.created_at)}</span>
      </div>
      <p class="comment-text">${escHtml(c.text)}</p>
    `;
    list.appendChild(el);
  });
  if (allComments.length > VISIBLE) {
    const btn = document.createElement('button');
    btn.className = 'show-more-btn';
    if (!expanded) {
      btn.textContent = `show ${allComments.length - VISIBLE} more`;
      btn.onclick = () => { expanded = true; renderComments(); };
    } else {
      btn.textContent = 'show less';
      btn.onclick = () => { expanded = false; renderComments(); };
    }
    list.appendChild(btn);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadComments() {
  try {
    const data = await sb('comments?select=*&order=created_at.desc');
    allComments = data || [];
    renderComments();
  } catch(e) {
    document.getElementById('comments-loading').textContent = 'could not load comments.';
  }
}

loadComments();

document.getElementById('submit-btn').onclick = async () => {
  const author = document.getElementById('inp-name').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const text = document.getElementById('inp-text').value.trim();
  const status = document.getElementById('form-status');
  const btn = document.getElementById('submit-btn');
  if (!author || !text) {
    status.className = 'form-status err';
    status.textContent = 'name and comment required';
    return;
  }
  btn.disabled = true;
  status.className = 'form-status';
  status.textContent = 'sending...';
  try {
    await sb('comments', {
      method: 'POST',
      prefer: 'return=minimal',
      body: { author, text, url: url || null }
    });
    status.className = 'form-status ok';
    status.textContent = 'sent ✓';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-url').value = '';
    document.getElementById('inp-text').value = '';
    await loadComments();
  } catch(e) {
    status.className = 'form-status err';
    status.textContent = 'error. try again.';
  } finally {
    btn.disabled = false;
  }
};
</script>
</body>
</html>
